name: Validate Agent Skill

on:
  push:
    branches: [main]
    paths:
      - "**/SKILL.md"
  pull_request:
    branches: [main]
    paths:
      - "**/SKILL.md"

concurrency:
  group: validate-skill-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-slim
    if: github.event.pull_request.draft != true && github.actor != 'dependabot[bot]'
    outputs:
      skills: ${{ steps.changed-skills.outputs.skills }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Dump GitHub Context
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: |
          echo "$GITHUB_CONTEXT"

      - name: Get changed skills
        id: changed-skills
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
            HEAD=${{ github.event.pull_request.head.sha }}
          else
            BASE=${{ github.event.before }}
            HEAD=${{ github.event.after }}
          fi

          # Use merge-base so we only see changes introduced by the PR branch,
          # not changes from other PRs merged into main since the branch diverged
          MERGE_BASE=$(git merge-base $BASE $HEAD)

          # Find changed SKILL.md files and extract skill directories
          SKILLS=$(git diff --name-only $MERGE_BASE $HEAD | \
            grep 'SKILL.md$' | \
            xargs -I {} dirname {} | \
            sort -u | \
            jq -R -s -c 'split("\n") | map(select(length > 0))')

          echo "skills=$SKILLS" >> $GITHUB_OUTPUT
          echo "Changed skills: $SKILLS"

  validate:
    needs: detect-changes
    if: needs.detect-changes.outputs.skills != '[]'
    runs-on: ubuntu-slim
    strategy:
      fail-fast: false
      matrix:
        skill: ${{ fromJson(needs.detect-changes.outputs.skills) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate directory name for ${{ matrix.skill }}
        run: |
          # The directory name should follow the format: kotlin-<category>-<functional-name>
          # <category> is from the CATEGORIES file
          # <functional-name> is kebab-case
          
          SKILL_DIR=$(basename ${{ matrix.skill }})
          echo "Validating directory name: $SKILL_DIR"
          
          if [[ ! $SKILL_DIR =~ ^kotlin-([a-z0-9]+)-([a-z0-9-]+)$ ]]; then
            echo "Error: Skill directory name '$SKILL_DIR' does not follow the format 'kotlin-<category>-<functional-name>'"
            exit 1
          fi
          
          CATEGORY="${BASH_REMATCH[1]}"
          FUNCTIONAL_NAME="${BASH_REMATCH[2]}"
          
          # Check if category is valid
          if ! grep -Fxq "$CATEGORY" CATEGORIES; then
            echo "Error: Category '$CATEGORY' is not one of the predefined categories in CATEGORIES file."
            echo "Allowed categories are:"
            cat CATEGORIES
            exit 1
          fi
          
          # Functional name must be kebab-case
          if [[ ! $FUNCTIONAL_NAME =~ ^[a-z0-9]+(-[a-z0-9]+)*$ ]]; then
            echo "Error: Functional name '$FUNCTIONAL_NAME' must be in kebab-case (lowercase, digits, and hyphens)."
            exit 1
          fi
          
          echo "Directory name validation passed."

      - name: Validate ${{ matrix.skill }}
        uses: Flash-Brew-Digital/validate-skill@v1
        with:
          path: ${{ matrix.skill }}